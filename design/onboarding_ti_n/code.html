<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="w-12"></div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">JPLearning</h2>
<div class="flex w-12 items-center justify-end">
<button class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0">Skip</button>
</div>
</div>
<div class="@container px-4 py-6">
<div class="w-full bg-primary/10 dark:bg-primary/20 flex flex-col items-center justify-center overflow-hidden rounded-xl min-h-[320px] relative border-2 border-primary/5">
<div class="flex flex-col items-center justify-center p-8 w-full h-full">
<div class="w-full h-48 flex items-end justify-between gap-2 px-4">
<div class="w-full bg-primary/40 rounded-t-lg" style="height: 40%"></div>
<div class="w-full bg-primary/60 rounded-t-lg" style="height: 65%"></div>
<div class="w-full bg-primary/80 rounded-t-lg" style="height: 55%"></div>
<div class="w-full bg-primary rounded-t-lg relative" style="height: 90%">
<div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-primary text-white text-xs font-bold py-1 px-2 rounded-full shadow-lg">100%</div>
</div>
<div class="w-full bg-primary/30 rounded-t-lg" style="height: 30%"></div>
</div>
<div class="flex justify-between w-full mt-4 text-primary/60 text-xs font-bold px-4">
<span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span>
</div>
</div>
<div class="absolute inset-0 pointer-events-none opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-transparent to-transparent"></div>
</div>
</div>
<div class="px-6 flex flex-col items-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight text-center pb-3 pt-4">Progress Tracking</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center px-4">Theo dõi lộ trình và tiến độ học tập mỗi ngày</p>
</div>
<div class="flex flex-col gap-6 px-6 py-8">
<div class="flex flex-col gap-4 bg-white dark:bg-slate-800/50 p-5 rounded-xl border border-primary/10 shadow-sm">
<div class="flex justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold">Thành tích tuần này</p>
<span class="material-symbols-outlined text-primary">trending_up</span>
</div>
<div class="flex items-baseline gap-2">
<p class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold">85%</p>
<p class="text-emerald-600 dark:text-emerald-400 text-sm font-bold leading-normal">+12% vs tuần trước</p>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 85%"></div>
</div>
</div>
<div class="flex gap-2 justify-center pb-4">
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
</div>
</div>
<div class="mt-auto px-6 pb-10">
<button class="w-full bg-primary text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
<span>Bắt đầu ngay</span>
<span class="material-symbols-outlined text-[20px]">rocket_launch</span>
</button>
</div>
</div>
</body></html>
