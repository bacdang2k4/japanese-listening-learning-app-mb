<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Chỉnh sửa hồ sơ</h2>
</div>
<!-- Profile Picture Section -->
<div class="flex p-6 @container">
<div class="flex w-full flex-col gap-4 items-center">
<div class="relative group">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full border-4 border-white dark:border-slate-800 shadow-lg h-32 w-32" data-alt="User profile avatar photo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDWXjTRQrS-hCCCaEwCBSQlgEYjeuXXML8XECfHQE1tPbGgcOfr-zRSXwIZfWq62j7LGEFjzV0Q6kwgSayOaKGeHTDyGAOayhkC6cBAyx7xxXLe9TUKPBhIzoTB0f3sTRRGFyybSq9WyDyIwPS-fRysZKJRiy9_JKaXgThN_HtME2uy1wMOPBXISDp9vgnkv35P1qI0uqtoFXNcHE6PLm6S5zvej0TR8L49EhGRB8SDxE6ln3v_icC_aZ_sttcFqStzyXI17m1BoIc");'>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full border-2 border-white dark:border-slate-800 shadow-md cursor-pointer">
<span class="material-symbols-outlined text-sm block">edit</span>
</div>
</div>
<p class="text-primary text-base font-semibold leading-tight tracking-tight text-center mt-2 cursor-pointer">Thay đổi ảnh</p>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-2 px-4 py-2">
<div class="flex flex-col w-full">
<label class="flex flex-col w-full py-3">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2 px-1 uppercase tracking-wider opacity-70">Họ tên</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-4 text-base font-normal leading-normal shadow-sm" placeholder="Nhập họ tên của bạn" type="text" value="Nguyễn Văn A"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full py-3">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2 px-1 uppercase tracking-wider opacity-70">Email</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-4 text-base font-normal leading-normal shadow-sm" placeholder="Nhập email của bạn" type="email" value="vanna.nguyen@example.com"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full py-3">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2 px-1 uppercase tracking-wider opacity-70">Cấp độ tiếng Nhật</p>
<div class="relative">
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 p-4 text-base font-normal leading-normal shadow-sm appearance-none">
<option>N5 - Sơ cấp</option>
<option selected="">N4 - Sơ trung cấp</option>
<option>N3 - Trung cấp</option>
<option>N2 - Cao cấp</option>
<option>N1 - Thượng cấp</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400">expand_more</span>
</div>
</div>
</label>
</div>
</div>
<!-- Spacing for bottom button -->
<div class="flex-grow"></div>
<!-- Footer Action -->
<div class="flex px-4 py-8">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg active:scale-[0.98] transition-transform">
<span class="truncate">Lưu thay đổi</span>
</button>
</div>
<div class="h-4 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
