<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JPLearning - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden font-display">
<!-- Top App Bar Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<a aria-label="Go back" class="text-primary flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create Account</h2>
</div>
<!-- Header Section -->
<div class="px-6 pt-8 pb-6 text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-light text-[32px] font-bold leading-tight pb-2">Join JPLearning</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Start your Japanese language journey today</p>
</div>
<!-- Registration Form Container -->
<form class="flex w-full max-w-[480px] mx-auto flex-col gap-4 px-6 py-4">
<!-- Username Field -->
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Username</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base transition-all" placeholder="Choose a unique username" required="" type="text"/>
</div>
</label>
<!-- Full Name Field -->
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Full Name</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base transition-all" placeholder="Enter your full name" required="" type="text"/>
</div>
</label>
<!-- Email Field -->
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Email Address</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base transition-all" placeholder="name@example.com" required="" type="email"/>
</div>
</label>
<!-- Password Field -->
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Password</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base transition-all" placeholder="Create a strong password" required="" type="password"/>
</div>
</label>
<!-- Confirm Password Field -->
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Confirm Password</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base transition-all" placeholder="Repeat your password" required="" type="password"/>
</div>
</label>
<!-- Terms and Privacy (Validation Context) -->
<div class="flex items-center gap-2 px-1 pt-2">
<input class="rounded text-primary focus:ring-primary bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700" id="terms" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-tight" for="terms">
                    I agree to the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Register Button -->
<div class="pt-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all active:scale-[0.98]" type="submit">
                    Register
                </button>
</div>
<!-- Footer / Back to Login -->
<div class="flex flex-col items-center justify-center gap-4 py-6">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</form>
<!-- Decorative Element -->
<div class="mt-auto p-6 flex justify-center opacity-30">
<div class="h-1 w-24 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
