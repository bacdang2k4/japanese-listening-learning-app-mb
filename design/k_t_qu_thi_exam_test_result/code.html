<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kết quả bài thi - JPLearning</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Kết quả bài thi</h2>
</div>
<!-- Score Overview Section -->
<div class="flex flex-col items-center justify-center p-6 gap-6">
<!-- Circular Progress Indicator -->
<div class="relative flex items-center justify-center">
<svg class="size-48 transform -rotate-90">
<circle class="text-primary/10" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-dasharray="552.92" stroke-dashoffset="94" stroke-width="12"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-4xl font-bold text-slate-900 dark:text-slate-100">25/30</span>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Câu đúng</span>
</div>
</div>
<!-- Pass/Fail Badge -->
<div class="bg-primary/10 text-primary px-8 py-2 rounded-full border border-primary/20">
<h1 class="text-3xl font-bold tracking-widest">ĐẠT</h1>
</div>
<!-- Feedback Message -->
<div class="text-center px-4">
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                    Chúc mừng! Bạn đã hoàn thành xuất sắc bài thi tiếng Nhật này. Hãy tiếp tục duy trì phong độ nhé!
                </p>
</div>
</div>
<!-- Detailed Performance Section -->
<div class="px-4 pb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-4">Chi tiết hiệu suất</h3>
<div class="grid grid-cols-2 gap-4">
<!-- Accuracy Card -->
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/5 shadow-sm">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-xl">target</span>
<span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Độ chính xác</span>
</div>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">83%</p>
</div>
<!-- Time Spent Card -->
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/5 shadow-sm">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-xl">schedule</span>
<span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Thời gian</span>
</div>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">12:45</p>
</div>
<!-- Correct Answers -->
<div class="bg-emerald-50 dark:bg-emerald-900/10 p-4 rounded-xl border border-emerald-100 dark:border-emerald-900/20">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-emerald-600 text-xl">check_circle</span>
<span class="text-xs font-medium text-emerald-700/70 uppercase tracking-wider">Số câu đúng</span>
</div>
<p class="text-xl font-bold text-emerald-600">25</p>
</div>
<!-- Incorrect Answers -->
<div class="bg-rose-50 dark:bg-rose-900/10 p-4 rounded-xl border border-rose-100 dark:border-rose-900/20">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-rose-600 text-xl">cancel</span>
<span class="text-xs font-medium text-rose-700/70 uppercase tracking-wider">Số câu sai</span>
</div>
<p class="text-xl font-bold text-rose-600">05</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto p-4 pb-8 flex flex-col gap-3">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
                Hoàn thành
            </button>
<button class="w-full bg-primary/10 text-primary font-bold py-4 rounded-xl hover:bg-primary/20 transition-colors border border-primary/20">
                Xem lịch sử
            </button>
</div>
</div>
</body></html>
