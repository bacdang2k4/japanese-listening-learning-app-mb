<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header / Top Bar -->
<header class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-primary/10 shadow-sm sticky top-0 z-10">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 px-4">
<h1 class="text-lg font-bold leading-tight tracking-tight text-primary">Chủ đề: Ăn uống</h1>
<p class="text-xs text-slate-500 dark:text-slate-400">JPLearning Flashcards</p>
</div>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col p-4 max-w-2xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-8">
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-semibold text-primary">Tiến độ học tập</span>
<span class="text-sm font-medium text-slate-600 dark:text-slate-400">Thẻ 5 / 20</span>
</div>
<div class="w-full h-3 bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 25%;"></div>
</div>
</div>
<!-- Flashcard Container -->
<div class="flex-1 flex flex-col justify-center py-4">
<div class="relative group h-[400px] w-full perspective-1000">
<!-- Front of Card -->
<div class="w-full h-full bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-primary/5 p-8 flex flex-col items-center justify-between text-center relative">
<div class="w-full flex justify-end">
<button class="text-primary/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
</div>
<div class="space-y-4">
<h2 class="text-5xl font-bold text-slate-900 dark:text-white">食べる</h2>
<p class="text-xl text-primary font-medium tracking-wide">Taberu</p>
<div class="pt-4">
<button class="flex items-center justify-center size-14 bg-primary/10 text-primary rounded-full hover:bg-primary/20 transition-all mx-auto">
<span class="material-symbols-outlined text-3xl">volume_up</span>
</button>
</div>
</div>
<div class="w-full pt-8">
<button class="w-full py-4 bg-primary/5 border-2 border-dashed border-primary/20 rounded-lg text-primary font-semibold hover:bg-primary/10 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">translate</span>
                            Xem ý nghĩa
                        </button>
</div>
</div>
</div>
</div>
<!-- Navigation & Actions -->
<div class="space-y-4 mt-8">
<!-- Mastery Button -->
<button class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                Đã thuộc từ này
            </button>
<!-- Navigation Buttons -->
<div class="flex gap-4">
<button class="flex-1 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 py-3 px-4 rounded-lg font-semibold border border-primary/10 hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">chevron_left</span>
                    Trước đó
                </button>
<button class="flex-1 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 py-3 px-4 rounded-lg font-semibold border border-primary/10 hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
                    Tiếp theo
                    <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="bg-white dark:bg-slate-900 border-t border-primary/10 px-4 py-2 flex justify-around items-center safe-area-bottom">
<a class="flex flex-col items-center gap-1 p-2 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">school</span>
<span class="text-[10px] font-medium">Học tập</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">translate</span>
<span class="text-[10px] font-medium">Từ điển</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-medium">Sổ tay</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Cá nhân</span>
</a>
</nav>
<style>
        .perspective-1000 {
            perspective: 1000px;
        }
        /* Custom spacing for small devices */
        @media (max-height: 700px) {
            .h-\[400px\] {
                height: 300px;
            }
            .py-8 {
                padding-top: 1.5rem;
                padding-bottom: 1.5rem;
            }
        }
    </style>
</body></html>
