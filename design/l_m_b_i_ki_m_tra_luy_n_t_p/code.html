<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-2xl">
<!-- Header / TopAppBar -->
<header class="flex flex-col shrink-0 border-b border-primary/10 bg-white dark:bg-background-dark">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Luyện tập: Chào hỏi</h2>
</div>
<!-- Progress Section -->
<div class="flex flex-col gap-2 p-4 pt-0">
<div class="flex justify-between items-end">
<p class="text-primary text-base font-semibold">Câu hỏi 3/20</p>
<div class="flex items-center gap-1.5 bg-primary/10 px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-sm text-primary">timer</span>
<p class="text-primary text-sm font-bold leading-none">14:25</p>
</div>
</div>
<div class="h-2.5 w-full rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 15%;"></div>
</div>
</div>
</header>
<!-- Main Content Scrollable Area -->
<main class="flex-1 overflow-y-auto p-4 space-y-6">
<!-- Audio Player Component -->
<div class="bg-primary/5 dark:bg-primary/10 rounded-xl p-4 border border-primary/10">
<div class="flex items-center gap-4">
<div class="bg-primary/20 rounded-lg size-14 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-3xl">headset</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold truncate">Nghe đoạn hội thoại</p>
<p class="text-slate-500 dark:text-slate-400 text-sm truncate">Bấm nút để nghe nội dung câu hỏi</p>
</div>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-primary text-white shadow-lg shadow-primary/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined">play_arrow</span>
</button>
</div>
<div class="mt-4 space-y-1">
<div class="relative h-1.5 w-full bg-primary/20 rounded-full">
<div class="absolute left-0 top-0 h-full w-1/3 bg-primary rounded-full"></div>
<div class="absolute left-[33%] -top-[5px] size-4 rounded-full bg-primary border-2 border-white shadow-sm"></div>
</div>
<div class="flex justify-between">
<span class="text-[10px] font-medium text-slate-500">0:12</span>
<span class="text-[10px] font-medium text-slate-500">0:45</span>
</div>
</div>
</div>
<!-- Question Text -->
<div class="space-y-3">
<span class="text-xs font-bold uppercase tracking-widest text-primary/60">Câu hỏi:</span>
<div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-relaxed text-center">
                        おはようございます。
                    </h3>
<p class="text-slate-400 text-sm text-center mt-2 italic">(Chào buổi sáng.)</p>
</div>
</div>
<!-- Answer Options -->
<div class="space-y-3">
<p class="text-sm font-medium text-slate-500 px-1">Chọn đáp án đúng nhất:</p>
<!-- Option A -->
<button class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 hover:border-primary/50 transition-all bg-white dark:bg-slate-800 text-left group">
<div class="size-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-500 group-hover:bg-primary group-hover:text-white transition-colors shrink-0">A</div>
<p class="text-slate-700 dark:text-slate-200 font-medium text-lg">こんにちは</p>
</button>
<!-- Option B (Selected State Example) -->
<button class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-primary transition-all bg-primary/5 dark:bg-primary/20 text-left group">
<div class="size-10 rounded-lg bg-primary flex items-center justify-center font-bold text-white shrink-0">B</div>
<div class="flex-1 flex justify-between items-center">
<p class="text-primary dark:text-primary-light font-bold text-lg">おはようございます</p>
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
</button>
<!-- Option C -->
<button class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 hover:border-primary/50 transition-all bg-white dark:bg-slate-800 text-left group">
<div class="size-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-500 group-hover:bg-primary group-hover:text-white transition-colors shrink-0">C</div>
<p class="text-slate-700 dark:text-slate-200 font-medium text-lg">おやすみなさい</p>
</button>
<!-- Option D -->
<button class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 hover:border-primary/50 transition-all bg-white dark:bg-slate-800 text-left group">
<div class="size-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-500 group-hover:bg-primary group-hover:text-white transition-colors shrink-0">D</div>
<p class="text-slate-700 dark:text-slate-200 font-medium text-lg">さようなら</p>
</button>
</div>
</main>
<!-- Footer Navigation -->
<footer class="p-4 border-t border-slate-100 dark:border-slate-800 flex gap-4 bg-white dark:bg-background-dark">
<button class="flex-1 h-14 flex items-center justify-center gap-2 rounded-xl border-2 border-slate-200 dark:border-slate-700 font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-lg">chevron_left</span>
                Trước đó
            </button>
<button class="flex-1 h-14 flex items-center justify-center gap-2 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/30 active:translate-y-0.5 transition-all">
                Tiếp theo
                <span class="material-symbols-outlined text-lg">chevron_right</span>
</button>
</footer>
</div>
</body></html>
