<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5d83",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141a1e",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between sticky top-0 z-10 border-b border-primary/10">
<button class="text-primary flex size-10 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-primary text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">JPLearning</h1>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-6 max-w-md mx-auto w-full">
<div class="w-full @container mb-8">
<div class="w-full aspect-[4/3] rounded-xl overflow-hidden bg-primary/5 flex items-center justify-center relative border border-primary/10 shadow-sm">
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent"></div>
<div class="relative z-10 flex flex-col items-center gap-4">
<span class="material-symbols-outlined text-primary text-8xl opacity-80">assignment_late</span>
<div class="h-1.5 w-24 bg-primary rounded-full opacity-30"></div>
</div>
<div class="absolute inset-0 bg-center bg-no-repeat bg-cover opacity-10 mix-blend-overlay" data-alt="Japanese traditional pattern background for exam screen" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAss1I81kr3SQyxIGWD3BVErLwqMgpc-rbox8_BgrLv5Yhih-Z21fH-Qq5EoBxvue-PrjVAel6qFj2ldSpYgdj1sKuJy-zl2rHc5iVjy8-oAds_sraeAxmteQp8t-pE9qWpkiBQuhZAlTN0e-LmXif10lcKv4rLSEqdJ90J5N8IPxnEbDlTN6mvcFW59Vo6pDb7mgree2IfWxveUO1RUTvINXT8ymftPxs6dL-rNTMHI9rZgrm6LNxgVhDnkOrwhpR01oLl-khWzA0");'>
</div>
</div>
</div>
<section class="w-full text-center space-y-4">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight">Quy định thi (Exam Rules)</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed max-w-[280px] mx-auto">
                Hãy chuẩn bị tinh thần và không gian yên tĩnh trước khi bắt đầu bài kiểm tra.
            </p>
</section>
<section class="w-full mt-8 bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-primary/5 shadow-sm">
<div class="space-y-4">
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input checked="" class="peer h-5 w-5 rounded border-primary/30 border-2 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 focus:outline-none transition-all cursor-pointer appearance-none checked:bg-primary checked:border-primary" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[16px] pointer-events-none opacity-0 peer-checked:opacity-100 left-[2px]">check</span>
</div>
<span class="text-slate-700 dark:text-slate-300 text-base font-medium leading-tight group-hover:text-primary transition-colors">Chỉ được nghe âm thanh 1 lần duy nhất</span>
</label>
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input checked="" class="peer h-5 w-5 rounded border-primary/30 border-2 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 focus:outline-none transition-all cursor-pointer appearance-none checked:bg-primary checked:border-primary" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[16px] pointer-events-none opacity-0 peer-checked:opacity-100 left-[2px]">check</span>
</div>
<span class="text-slate-700 dark:text-slate-300 text-base font-medium leading-tight group-hover:text-primary transition-colors">Thời gian làm bài có hạn</span>
</label>
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input checked="" class="peer h-5 w-5 rounded border-primary/30 border-2 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 focus:outline-none transition-all cursor-pointer appearance-none checked:bg-primary checked:border-primary" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[16px] pointer-events-none opacity-0 peer-checked:opacity-100 left-[2px]">check</span>
</div>
<span class="text-slate-700 dark:text-slate-300 text-base font-medium leading-tight group-hover:text-primary transition-colors">Không thể tạm dừng khi đã bắt đầu</span>
</label>
</div>
</section>
<footer class="w-full mt-auto pt-8 pb-4 flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Bắt đầu thi ngay</span>
<span class="material-symbols-outlined text-[20px]">play_arrow</span>
</button>
<button class="w-full bg-primary/10 hover:bg-primary/20 text-primary font-bold py-4 rounded-xl transition-all">
                Quay lại
            </button>
</footer>
</main>
<div class="h-4 bg-background-light dark:bg-background-dark"></div>
</body></html>
